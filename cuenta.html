<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta - CyberTilines</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Open+Sans:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cuenta_estilos.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        .panel-loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0d0d13;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            color: #ffcc00;
            letter-spacing: 2px;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            box-sizing: border-box;
        }

        .loading-title {
            font-size: 14px;
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.6);
            animation: pulseText 1.5s infinite alternate;
        }

        .loading-bar-container {
            width: 60%;
            max-width: 300px;
            height: 4px;
            background: rgba(255, 204, 0, 0.1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 204, 0, 0.3);
        }

        .loading-bar-progress {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #ffcc00;
            box-shadow: 0 0 10px #ffcc00;
            animation: cyberpunkLoading 2s infinite linear;
        }

        .loading-status {
            font-family: 'Open Sans', sans-serif;
            font-size: 10px;
            color: rgba(255, 204, 0, 0.6);
            margin-top: 10px;
            font-weight: 600;
        }

        @keyframes pulseText {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        @keyframes cyberpunkLoading {
            0% { left: -100%; }
            50% { left: 0; }
            100% { left: 100%; }
        }
    </style>
</head>
<body class="body-cuenta">

    <div id="loading-screen-cuenta" class="panel-loading-screen">
        <div class="loading-title">SISTEMA // CONECTANDO...</div>
        <div class="loading-bar-container">
            <div class="loading-bar-progress"></div>
        </div>
        <div class="loading-status">SINCRO_DATA_USER_REF: OK</div>
    </div>

    <div class="login-fullscreen-bg">
        <div class="bg-text-container">
            <div class="scrolling-text" id="texto-marquesina-fondo"></div>
        </div>
    </div>

    <a href="index.html" class="volver-btn">← Volver</a>

    <div class="container cuenta-grid">
        
        <aside class="menu-lateral">
            <svg class="corner-svg ts-left" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M 0 35 L 35 0" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
                <path d="M 0 50 L 19 31" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
                <path d="M 31 19 L 50 0" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
            </svg>
            
            <svg class="corner-svg bs-right" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M 70 35 L 35 70" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
                <path d="M 20 70 L 39 51" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
                <path d="M 51 39 L 70 20" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
            </svg>
            
            <nav class="menu-nav">

        <main class="panel-central animacion-entrada" id="panel-contenedor">

            <svg class="corner-svg ts-left" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M 0 35 L 35 0" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
                <path d="M 0 50 L 19 31" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
                <path d="M 31 19 L 50 0" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
            </svg>
            
            <svg class="corner-svg bs-right" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M 70 35 L 35 70" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
                <path d="M 20 70 L 39 51" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
                <path d="M 51 39 L 70 20" stroke="#ffcc00" stroke-width="3" stroke-linecap="square"/>
            </svg>

            <div class="panel-content-wrapper">
                <section id="seccion-perfil" class="cuenta-section transicion-contenido activo">
                    <h3 class="border-title">01. PERSONALIZAR PERFIL</h3>
                    
                    <div class="perfil-cabecera-container">

                        <div class="perfil-banner-wrapper">
                            <div class="perfil-banner-preview" id="banner-preview"></div>
                            <button type="button" class="btn-cambiar-banner" id="btn-cambiar-portada">
                                📷 Cambiar foto de portada
                            </button>
                            <input type="file" id="input-archivo-portada" accept="image/*" style="display: none;">

                        <div class="perfil-identidad-row">

                            <div class="perfil-avatar-wrapper">
                                <div class="avatar-circular-marco">
                                    <div class="avatar-placeholder" id="avatar-letra">M</div>
                                    <label for="input-archivo-foto" class="avatar-overlay-camera" title="Cambiar foto de perfil">📷</label>

                                <input type="file" id="input-archivo-foto" accept="image/*" style="display: none;">
                            </div>

                            <div class="perfil-identidad-texto">

                                </h2>
                                <span id="user-display-email" class="user-display-email"></span>
                            </div>

                            <div class="medidas-indicadores">

                                <span>Portada: <strong>700×430 px</strong></span>

                    <div class="inputs-block-container">
                        <form class="custom-form" id="form-perfil" onsubmit="return false;">
                            <div class="input-group">
                                <label>USERNAME VISIBLE (APARECERÁ ENTRE PARÉNTESIS)</label>
                                <input type="text" id="userUsername" placeholder="Ej: MilaDev">
                            </div>
                            
                            <div class="input-group">
                                <label>DESCRIPCIÓN DE USUARIO</label>
                                <textarea id="userBio" rows="4" placeholder="Cuéntanos un poco sobre ti o tu rol..."></textarea>
                            </div>
                            
                            <button type="button" id="btnGuardarPerfil" class="submit-btn">GUARDAR CAMBIOS</button>
                            <p id="msg-guardado" style="color: #ffcc00; font-family: 'Open Sans', sans-serif; font-size: 13px; margin-top: 10px; min-height: 18px; font-weight: 600;"></p>
                        </form>
                    </div>
                </section>

                <section id="seccion-seguridad" class="cuenta-section transicion-contenido" style="display: none;">
                    <h3 class="border-title">02. SEGURIDAD DEL SISTEMA</h3>
                    <form class="custom-form" id="form-seguridad" style="max-width: 700px;" onsubmit="return false;">
                        <div class="input-group">
                            <label>CONTRASEÑA ACTUAL</label>
                            <input type="password" id="passActual" placeholder="••••••••">
                        </div>
                        <div class="input-group">
                            <label>NUEVA CONTRASEÑA</label>
                            <input type="password" id="passNueva" placeholder="••••••••">
                        </div>
                        <div class="input-group">
                            <label>CONFIRMAR NUEVA CONTRASEÑA</label>
                            <input type="password" id="passConfirmar" placeholder="••••••••">
                        </div>
                        <button type="button" id="btnGuardarSeguridad" class="submit-btn">ACTUALIZAR CONTRASEÑA</button>
                        <p id="msg-seguridad" style="color: #ffcc00; font-family: 'Open Sans', sans-serif; font-size: 13px; margin-top: 10px; min-height: 18px; font-weight: 600;"></p>

        </main>

    <div id="modal-recorte" class="modal-cropper" style="display: none;">
        <div class="modal-content">
            <h3>AJUSTAR FOTO DE PERFIL</h3>
            <div class="preview-container">
                <img id="imagen-a-recortar" src="" alt="Previsualización">
            </div>
            <div class="modal-buttons">
                <button id="btn-cancelar-corte" class="btn-secundario">CANCELAR</button>
                <button id="btn-guardar-corte" class="submit-btn" style="margin-top: 0;">APLICAR AJUSTE</button>
            </div>
        </div>
    </div>

    <div id="modal-recorte-banner" class="modal-cropper" style="display: none;">
        <div class="modal-content" style="max-width: 860px; width: 92%;">
            <h3>AJUSTAR FOTO DE PORTADA</h3>
            <p style="font-family:'Open Sans',sans-serif; font-size:12px; color:rgba(255,255,255,0.5); margin-bottom:14px; font-weight:600;">
                Arrastra y ajusta la imagen — proporción 700×430
            </p>
            <div class="preview-container-banner">
                <img id="imagen-a-recortar-banner" src="" alt="Previsualización portada">
            </div>
            <div class="modal-buttons">
                <button id="btn-cancelar-corte-banner" class="btn-secundario">CANCELAR</button>
                <button id="btn-guardar-corte-banner" class="submit-btn" style="margin-top: 0;">APLICAR AJUSTE</button>
            </div>
        </div>
    </div>

    <script>
        const tabCuenta = document.getElementById('tab-cuenta');
        const tabSeguridad = document.getElementById('tab-seguridad');
        const seccionPerfil = document.getElementById('seccion-perfil');
        const seccionSeguridad = document.getElementById('seccion-seguridad');
        const contenedorTextoFondo = document.getElementById('texto-marquesina-fondo');

        function actualizarTextoFondo(palabra) {
            contenedorTextoFondo.style.animation = 'none';
            contenedorTextoFondo.offsetHeight; 
            contenedorTextoFondo.style.animation = 'fadeInTextoFondo 0.5s ease-out forwards';

            let contenido = '';
            for (let i = 0; i < 14; i++) {
                contenido += `<span>${(palabra + ' ').repeat(15)}</span>\n`;
            }
            contenedorTextoFondo.innerHTML = contenido;
        }

        function cambiarPestaña(tabActiva, tabInactiva, seccionActiva, seccionInactiva, textoFondo) {
            tabActiva.classList.add('active');
            tabInactiva.classList.remove('active');
            
            tabActiva.querySelector('.cursor-blink').style.display = 'inline-block';
            tabInactiva.querySelector('.cursor-blink').style.display = 'none';
            
            seccionInactiva.classList.remove('activo');
            
            setTimeout(() => {
                seccionInactiva.style.display = 'none';
                seccionActiva.style.display = 'block';
                
                setTimeout(() => {
                    seccionActiva.classList.add('activo');
                }, 30);
            }, 200);

            actualizarTextoFondo(textoFondo);
        }

        actualizarTextoFondo('CUENTA');

        tabCuenta.addEventListener('click', () => {
            if(!seccionPerfil.classList.contains('activo')) {
                cambiarPestaña(tabCuenta, tabSeguridad, seccionPerfil, seccionSeguridad, 'CUENTA');
            }
        });

        tabSeguridad.addEventListener('click', () => {
            if(!seccionSeguridad.classList.contains('activo')) {
                cambiarPestaña(tabSeguridad, tabCuenta, seccionSeguridad, seccionPerfil, 'SEGURIDAD');
            }
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, EmailAuthProvider, reauthenticateWithCredential, updatePassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCybJ3x7mCXGoX_QvX-lww8DNsxCMl_jrc",
            authDomain: "proyectopaginacybertilines.firebaseapp.com",
            projectId: "proyectopaginacybertilines",
            storageBucket: "proyectopaginacybertilines.firebasestorage.app",
            messagingSenderId: "515231457085",
            appId: "1:515231457085:web:82cfc9620965f170036f54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const userDisplayName = document.getElementById('user-display-name');
        const userSmallUsername = document.getElementById('user-small-username');
        const userDisplayEmail = document.getElementById('user-display-email');
        
        const avatarLetra = document.getElementById('avatar-letra');
        const userUsernameInput = document.getElementById('userUsername');
        const userBioInput = document.getElementById('userBio');
        const msgGuardado = document.getElementById('msg-guardado');
        
        const inputArchivoFoto = document.getElementById('input-archivo-foto');
        const loadingScreen = document.getElementById('loading-screen-cuenta');

        const btnCambiarPortada = document.getElementById('btn-cambiar-portada');
        const inputArchivoPortada = document.getElementById('input-archivo-portada');
        const bannerPreview = document.getElementById('banner-preview');

        const passActualInput = document.getElementById('passActual');
        const passNuevaInput = document.getElementById('passNueva');
        const passConfirmarInput = document.getElementById('passConfirmar');
        const btnGuardarSeguridad = document.getElementById('btnGuardarSeguridad');
        const msgSeguridad = document.getElementById('msg-seguridad');

        const modalRecorte = document.getElementById('modal-recorte');
        const imagenARecortar = document.getElementById('imagen-a-recortar');
        const btnCancelarCorte = document.getElementById('btn-cancelar-corte');
        const btnGuardarCorte = document.getElementById('btn-guardar-corte');
        
        let cropper = null; 
        let cropperBanner = null;
        let userDocRef = null;
        let uidUsuarioActual = null;
        let nombreArchivoOriginal = "";
        let nombreArchivoPortada = "";
        let usuarioActual = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                usuarioActual = user;
                uidUsuarioActual = user.uid;
                userDocRef = doc(db, "usuarios", user.uid);
                
                userDisplayEmail.innerText = user.email || "";
                
                try {
                    const snap = await getDoc(userDocRef);
                    if (snap.exists()) {
                        const userData = snap.data();
                        
                        userDisplayName.innerText = userData.nombreReal || "Usuario sin nombre";
                        
                        if (userData.username && userData.username.trim() !== "") {
                            userSmallUsername.innerText = `(${userData.username.trim()})`;
                        } else {
                            userSmallUsername.innerText = "";
                        }

                        userUsernameInput.value = userData.username || "";
                        userBioInput.value = userData.bio || "";
                        
                        if (userData.fotoPerfilUrl) {
                            avatarLetra.innerText = ""; 
                            avatarLetra.style.backgroundImage = `url('${userData.fotoPerfilUrl}')`;
                        } else if (userData.nombreReal) {
                            avatarLetra.style.backgroundImage = "none";
                            avatarLetra.innerText = userData.nombreReal.charAt(0).toUpperCase();
                        }

                        if (userData.fotoPortadaUrl) {
                            bannerPreview.style.backgroundImage = `url('${userData.fotoPortadaUrl}')`;
                        } else {
                            bannerPreview.style.backgroundImage = "linear-gradient(135deg, #1e293b 0%, #0f172a 100%)";
                        }
                    } else {
                        userDisplayName.innerText = "Error: Perfil no registrado";
                    }
                } catch (error) {
                    console.error("Error al obtener Firestore:", error);
                    userDisplayName.innerText = "Error al conectar con la base de datos";
                } finally {
                    if(loadingScreen) {
                        loadingScreen.style.opacity = '0';
                        loadingScreen.style.visibility = 'hidden';
                        setTimeout(() => {
                            loadingScreen.style.display = 'none';
                        }, 400);
                    }
                }
            } else {
                window.location.href = "index.html";
            }
        });

        const modalRecorteBanner   = document.getElementById('modal-recorte-banner');
        const imagenARecortarBanner = document.getElementById('imagen-a-recortar-banner');
        const btnCancelarCorteBanner = document.getElementById('btn-cancelar-corte-banner');
        const btnGuardarCorteBanner  = document.getElementById('btn-guardar-corte-banner');

        // Eventos para la Portada — ahora con cropper
        if (btnCambiarPortada && inputArchivoPortada) {
            btnCambiarPortada.addEventListener('click', () => inputArchivoPortada.click());

            inputArchivoPortada.addEventListener('change', (e) => {
                const archivo = e.target.files[0];
                if (!archivo) return;

                nombreArchivoPortada = archivo.name;
                const lector = new FileReader();

                lector.onload = function(evento) {
                    imagenARecortarBanner.src = evento.target.result;
                    modalRecorteBanner.style.display = "flex";

                    if (cropperBanner) cropperBanner.destroy();

                    cropperBanner = new Cropper(imagenARecortarBanner, {
                        aspectRatio: 700 / 430,
                        viewMode: 2,      
                        background: false,
                        autoCropArea: 1,  
                        responsive: true,
                        checkCrossOrigin: false
                    });
                };
                lector.readAsDataURL(archivo);
            });
        }

        btnCancelarCorteBanner.addEventListener('click', () => {
            modalRecorteBanner.style.display = "none";
            if (cropperBanner) cropperBanner.destroy();
            inputArchivoPortada.value = "";
        });

        btnGuardarCorteBanner.addEventListener('click', () => {
            if (!cropperBanner || !uidUsuarioActual) return;

            const canvasRecortado = cropperBanner.getCroppedCanvas({
                width: 700,
                height: 430
            });

            modalRecorteBanner.style.display = "none";
            cropperBanner.destroy();

            msgGuardado.style.color = "#ffcc00";
            msgGuardado.innerText = "Subiendo foto de portada ajustada...";

            canvasRecortado.toBlob(async (blob) => {
                if (!blob) {
                    msgGuardado.style.color = "#ff4444";
                    msgGuardado.innerText = "Error al procesar el recorte de portada.";
                    return;
                }

                const rutaPortada = ref(storage, `banners/${uidUsuarioActual}/cropped_${nombreArchivoPortada}`);
                try {
                    const resultadoSubida = await uploadBytes(rutaPortada, blob);
                    const urlDescarga = await getDownloadURL(resultadoSubida.ref);

                    await updateDoc(userDocRef, { fotoPortadaUrl: urlDescarga });
                    bannerPreview.style.backgroundImage = `url('${urlDescarga}')`;

                    msgGuardado.style.color = "#00ff88";
                    msgGuardado.innerText = "¡Foto de portada ajustada y guardada con éxito!";
                    setTimeout(() => { msgGuardado.innerText = ""; }, 3000);
                } catch (err) {
                    console.error("Error al subir portada:", err);
                    msgGuardado.style.color = "#ff4444";
                    msgGuardado.innerText = "Error al guardar la foto de portada.";
                } finally {
                    inputArchivoPortada.value = "";
                }
            }, "image/jpeg", 0.92);
        });

        inputArchivoFoto.addEventListener('change', (e) => {
            const archivo = e.target.files[0];
            if (!archivo) return;

            nombreArchivoOriginal = archivo.name;
            const lector = new FileReader();
            
            lector.onload = function(evento) {
                imagenARecortar.src = evento.target.result;
                modalRecorte.style.display = "flex"; 

                if (cropper) cropper.destroy();

                cropper = new Cropper(imagenARecortar, {
                    aspectRatio: 1, 
                    viewMode: 1,    
                    background: false,
                    autoCropArea: 1,
                    responsive: true
                });
            };
            lector.readAsDataURL(archivo);
        });

        btnCancelarCorte.addEventListener('click', () => {
            modalRecorte.style.display = "none";
            if (cropper) cropper.destroy();
            inputArchivoFoto.value = ""; 
        });

        btnGuardarCorte.addEventListener('click', () => {
            if (!cropper || !uidUsuarioActual) return;

            const canvasRecortado = cropper.getCroppedCanvas({
                width: 400,
                height: 400
            });

            modalRecorte.style.display = "none";
            cropper.destroy();

            msgGuardado.style.color = "#ffcc00";
            msgGuardado.innerText = "Subiendo imagen ajustada...";

            canvasRecortado.toBlob(async (blob) => {
                if (!blob) {
                    msgGuardado.style.color = "#ff4444";
                    msgGuardado.innerText = "Error al procesar el recorte.";
                    return;
                }

                const rutaAlmacenamiento = ref(storage, `avatars/${uidUsuarioActual}/cropped_${nombreArchivoOriginal}`);

                try {
                    const resultadoSubida = await uploadBytes(rutaAlmacenamiento, blob);
                    const urlDescarga = await getDownloadURL(resultadoSubida.ref);

                    await updateDoc(userDocRef, { fotoPerfilUrl: urlDescarga });

                    avatarLetra.innerText = "";
                    avatarLetra.style.backgroundImage = `url('${urlDescarga}')`;

                    msgGuardado.style.color = "#00ff88";
                    msgGuardado.innerText = "¡Foto de perfil ajustada y guardada con éxito!";
                    setTimeout(() => { msgGuardado.innerText = ""; }, 3000);

                } catch (error) {
                    console.error("Error al subir el recorte:", error);
                    msgGuardado.style.color = "#ff4444";
                    msgGuardado.innerText = "Error al guardar el ajuste en el servidor.";
                } finally {
                    inputArchivoFoto.value = ""; 
                }
            }, "image/jpeg", 0.9); 
        });

        document.getElementById('btnGuardarPerfil').addEventListener('click', async () => {
            if (!userDocRef) return;
            const nuevoUsername = userUsernameInput.value.trim();

            msgGuardado.style.color = "#ffcc00";
            msgGuardado.innerText = "Guardando cambios...";

            try {
                await updateDoc(userDocRef, {
                    username: nuevoUsername,
                    bio: userBioInput.value.trim()
                });

                if (nuevoUsername !== "") {
                    userSmallUsername.innerText = `(${nuevoUsername})`;
                } else {
                    userSmallUsername.innerText = "";
                }

                msgGuardado.style.color = "#00ff88";
                msgGuardado.innerText = "¡Cambios guardados correctamente!";
                setTimeout(() => { msgGuardado.innerText = ""; }, 3000);
            } catch (error) {
                console.error("Error al actualizar perfil:", error);
                msgGuardado.style.color = "#ff4444";
                msgGuardado.innerText = "Error al intentar guardar los datos.";
            }
        });

        btnGuardarSeguridad.addEventListener('click', async () => {
            if (!usuarioActual) return;

            const passActual = passActualInput.value;
            const passNueva = passNuevaInput.value;
            const passConfirmar = passConfirmarInput.value;

            if (!passActual || !passNueva || !passConfirmar) {
                msgSeguridad.style.color = "#ff4444";
                msgSeguridad.innerText = "Por favor, completa todos los campos de contraseña.";
                return;
            }

            if (passNueva !== passConfirmar) {
                msgSeguridad.style.color = "#ff4444";
                msgSeguridad.innerText = "La nueva contraseña y su confirmación no coinciden.";
                return;
            }

            if (passNueva.length < 6) {
                msgSeguridad.style.color = "#ff4444";
                msgSeguridad.innerText = "La nueva contraseña debe tener al menos 6 caracteres.";
                return;
            }

            msgSeguridad.style.color = "#ffcc00";
            msgSeguridad.innerText = "Autenticando credenciales actuales...";

            try {
                const credencial = EmailAuthProvider.credential(usuarioActual.email, passActual);
                await reauthenticateWithCredential(usuarioActual, credencial);
                
                msgSeguridad.innerText = "Actualizando contraseña en el sistema...";
                await updatePassword(usuarioActual, passNueva);

                msgSeguridad.style.color = "#00ff88";
                msgSeguridad.innerText = "¡Contraseña actualizada con éxito!";
                
                passActualInput.value = "";
                passNuevaInput.value = "";
                passConfirmarInput.value = "";

                setTimeout(() => { msgSeguridad.innerText = ""; }, 4000);
            } catch (error) {
                console.error("Error en el cambio de contraseña:", error);
                msgSeguridad.style.color = "#ff4444";

                if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                    msgSeguridad.innerText = "La contraseña actual es incorrecta.";
                } else if (error.code === 'auth/requires-recent-login') {
                    msgSeguridad.innerText = "Por seguridad, vuelve a iniciar sesión e intenta nuevamente.";
                } else {
                    msgSeguridad.innerText = "Error crítico del sistema al cambiar la contraseña.";
                }
            }
        });
    </script>
</body>
</html>
